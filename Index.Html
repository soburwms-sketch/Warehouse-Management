<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warehouse Management System</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6fb;
    overflow-x:hidden;
}

.wrapper{
    display:flex;
    width:100%;
    min-height:100vh;
}

/* ==========================
SIDEBAR
========================== */

.sidebar{

    width:260px;
    background:#0d6efd;
    color:#ffffff;
    display:flex;
    flex-direction:column;
    transition:.3s;

}

.sidebar-header{

    padding:22px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.15);

}

.sidebar-header i{

    margin-right:8px;

}

.sidebar-menu{

    flex:1;
    padding:15px;

}

.sidebar-menu a{

    display:block;
    color:#ffffff;
    text-decoration:none;
    padding:12px 16px;
    margin-bottom:6px;
    border-radius:8px;
    transition:.25s;

}

.sidebar-menu a:hover{

    background:rgba(255,255,255,.15);

}

.sidebar-menu a.active{

    background:#ffffff;
    color:#0d6efd;
    font-weight:600;

}

.sidebar-menu i{

    width:20px;
    margin-right:10px;

}

.submenu{

    margin-left:15px;
    margin-top:5px;
    margin-bottom:10px;

}

.sidebar-footer{

    padding:15px;
    border-top:1px solid rgba(255,255,255,.15);

}

/* ==========================
CONTENT
========================== */

.content{

    flex:1;
    display:flex;
    flex-direction:column;
    min-height:100vh;

}

.topbar{

    height:70px;
    background:#ffffff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

.topbar-left{

    display:flex;
    align-items:center;
    gap:15px;

}

.topbar-title h5{

    margin:0;
    font-weight:600;

}

.topbar-title small{

    color:#777;

}

.topbar-right{

    display:flex;
    align-items:center;
    gap:15px;

}

.user-avatar{

    width:42px;
    height:42px;
    border-radius:50%;
    background:#0d6efd;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:700;

}

.main-content{

    flex:1;
    padding:25px;

}

.page-card{

    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.06);

}

.table thead{

    background:#0d6efd;
    color:#ffffff;

}

.btn-primary-custom{

    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 18px;

}

.btn-primary-custom:hover{

    background:#0b5ed7;

}

</style>

</head>

<body>

<div class="wrapper">

    <!-- ==========================
    SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <i class="bi bi-box-seam-fill"></i>

            WMS

        </div>

        <div class="sidebar-menu">

            <a href="#" class="active" onclick="openDashboard()">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="#">

                <i class="bi bi-database"></i>

                Master Data

            </a>

            <div class="submenu">

                <a href="#" onclick="openCategory()">

                    <i class="bi bi-tags"></i>

                    Category

                </a>

                <a href="#" onclick="openSupplier()">

                    <i class="bi bi-truck"></i>

                    Supplier

                </a>

                <a href="#" onclick="openLocation()">

                    <i class="bi bi-geo-alt"></i>

                    Location

                </a>

                <a href="#" onclick="openUnit()">

                    <i class="bi bi-rulers"></i>

                    Unit

                </a>

                <a href="#" onclick="openSparepart()">

                    <i class="bi bi-box-seam"></i>

                    Sparepart

                </a>

            </div>

        </div>

        <div class="sidebar-footer">

            <button
                class="btn btn-light w-100"
                onclick="logout()">

                <i class="bi bi-box-arrow-right"></i>

                Logout

            </button>

        </div>

    </aside>

    <!-- CONTENT DIMULAI DI PART 2 -->

        <!-- ==========================
    CONTENT
    ========================== -->

    <div class="content">

        <!-- ==========================
        TOPBAR
        ========================== -->

        <header class="topbar">

            <div class="topbar-left">

                <button
                    class="btn btn-outline-primary"
                    onclick="toggleSidebar()">

                    <i class="bi bi-list"></i>

                </button>

                <div class="topbar-title">

                    <h5 id="pageTitle">

                        Dashboard

                    </h5>

                    <small id="pageSubTitle">

                        Warehouse Management System

                    </small>

                </div>

            </div>

            <div class="topbar-right">

                <div class="text-end">

                    <strong id="loginName">

                        Administrator

                    </strong>

                    <br>

                    <small id="loginRole">

                        ADMIN

                    </small>

                </div>

                <div class="user-avatar">

                    A

                </div>

            </div>

        </header>

        <!-- ==========================
        MAIN CONTENT
        ========================== -->

        <main
            id="mainContent"
            class="main-content">

        </main>

    </div>

</div>

<!-- ==========================
TOAST
========================== -->

<div
class="toast-container position-fixed bottom-0 end-0 p-3">

    <div
        id="appToast"
        class="toast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true">

        <div class="toast-header">

            <i
            id="toastIcon"
            class="bi bi-info-circle-fill text-primary me-2">

            </i>

            <strong
            id="toastTitle"
            class="me-auto">

                Information

            </strong>

            <button
                class="btn-close"
                data-bs-dismiss="toast">

            </button>

        </div>

        <div
            id="toastMessage"
            class="toast-body">

            ...

        </div>

    </div>

</div>

<!-- ==========================
IMAGE PREVIEW
========================== -->

<div
class="modal fade"
id="previewImageModal"
tabindex="-1">

    <div
    class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Preview Image

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body text-center">

                <img
                    id="previewImage"
                    class="img-fluid rounded"
                    style="max-height:650px;">

            </div>

        </div>

    </div>

</div>

<!-- ==========================
LOADING
========================== -->

<div
id="loadingOverlay"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(255,255,255,.7);
z-index:99999;">

    <div
    class="d-flex justify-content-center align-items-center h-100">

        <div
        class="spinner-border text-primary">

        </div>

    </div>

</div>

<!-- =====================================================
BOOTSTRAP
===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- =====================================================
LOAD JAVASCRIPT
===================================================== -->

<script>
<?!= include("Javascript"); ?>
</script>

<!-- =====================================================
INITIAL APP
===================================================== -->

<script>

window.onload = function(){

    if(typeof openDashboard === "function"){

        openDashboard();

    }else{

        console.error("openDashboard() tidak ditemukan.");

        document.getElementById("mainContent").innerHTML = `

            <div class="alert alert-danger">

                <h5 class="mb-2">

                    Javascript.html gagal dimuat

                </h5>

                <hr>

                <p class="mb-0">

                    Function <b>openDashboard()</b> tidak ditemukan.

                </p>

            </div>

        `;

    }

};

</script>

</body>

</html>
